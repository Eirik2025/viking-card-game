<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/battle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="battle-container">
        <!-- Header -->
        <div class="battle-header">
            <div class="player-area" id="player-area">
                <div class="player-identity">
                    <img id="player-avatar" src="" alt="You">
                    <div class="player-details">
                        <h2 id="player-name">You</h2>
                        <div class="stat-badges" id="player-badges"></div>
                    </div>
                </div>
                <div class="player-resources" id="player-resources"></div>
            </div>
            
            <div class="battle-info">
                <div class="turn-display" id="turn-display">Your Turn</div>
                <div class="battle-code" id="display-code">----</div>
                <button class="btn btn-primary" id="end-turn-btn" onclick="endTurn()">End Turn</button>
            </div>
            
            <div class="player-area opponent" id="opponent-area">
                <div class="player-identity">
                    <img id="opponent-avatar" src="" alt="Opponent">
                    <div class="player-details">
                        <h2 id="opponent-name">Opponent</h2>
                        <div class="stat-badges" id="opponent-badges"></div>
                    </div>
                </div>
                <div class="player-resources opponent" id="opponent-resources"></div>
            </div>
        </div>

        <!-- Battle Zone -->
        <div class="battle-zone" id="battle-zone">
            <!-- Dynamic Content Based on Config -->
        </div>

        <!-- Battle Log -->
        <div class="battle-log" id="battle-log">
            <div class="log-header">
                <h3>📜 Battle Log</h3>
                <button class="btn btn-sm" onclick="toggleLog()">Toggle</button>
            </div>
            <div class="log-messages" id="log-messages"></div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="modal hidden">
        <div class="modal-content win-content">
            <h1 id="win-title">Victory!</h1>
            <p id="Win-message"></p>
            <div class="Win-stats" id="Win-stats"></div>
            <button class="btn btn-primary btn-large" onclick="ReturnToLobby()">Return to Lobby</button>
        </div>
    </div>

    <script type="module" src="js/supabase-client.js"></script>
    <script type="module" src="js/auth-guard.js"></script>
    <script type="module" src="js/battle.js"></script>
</body>
</html>
