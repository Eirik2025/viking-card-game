<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Viking Card Game</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">⚔️ Viking Cards</div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <form id="login-form" class="auth-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary btn-full">Enter the Arena</button>
            </form>

            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <input type="password" id="reg-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-primary btn-full">Join the Battle</button>
            </form>

            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <script type="module" src="js/supabase-client.js"></script>
<script type="module" src="js/auth-guard.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
