<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">👤 Profile</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html" class="active">Profile</a></li>
        </ul>
        <div class="user-menu">
            <button class="btn btn-secondary" onclick="signOut()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <img id="profile-avatar" src="" alt="Avatar" class="profile-avatar">
                    <label for="avatar-upload" class="avatar-overlay">📷 Change</label>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                </div>
                <h1 id="profile-name">Warrior</h1>
                <span id="profile-role" class="role-badge">User</span>
            </div>
        </div>

        <div class="profile-grid">
            <!-- Stats Column -->
            <div class="profile-card">
                <h2>⚔️ Combat Stats</h2>
                <div class="stat-grid" id="combat-stats"></div>
                <div class="exp-bar-container">
                    <div class="exp-label">Experience</div>
                    <div class="exp-bar">
                        <div id="exp-fill" class="exp-fill" style="width: 0%"></div>
                        <span id="exp-text">0 / 100</span>
                    </div>
                </div>
            </div>

            <!-- Social Column -->
            <div class="profile-card">
                <h2>👥 Social</h2>
                <div class="info-list" id="social-info"></div>
            </div>

            <!-- Kingdom Column -->
            <div class="profile-card">
                <h2>🏰 Kingdom</h2>
                <div class="info-list" id="kingdom-info"></div>
            </div>

            <!-- Collection Column -->
            <div class="profile-card wide">
                <h2>🃏 Collection</h2>
                <div class="collection-summary" id="collection-summary"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/supabase-client.js"></script>
    <script type="module" src="js/auth-guard.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
